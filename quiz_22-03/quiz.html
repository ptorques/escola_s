<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de proutos</title>
    <style>
        body{
            margin: 0;
            font-family: Verdana;
            background-color: white;
            background: url("https://langleygroup.com.au/wp-content/uploads/Purple-world-map.png");
            background-size: 100%;
            background-repeat: repeat-x;
            background-position: center;
        }
        header{
            background-color: rgb(196, 117, 236);
            padding: 50px;
        }
        header > h1{
            margin: auto;
            font-family: Georgia, "Times New Roman", serif;
            color: #000000;
            text-align: center;
            font-size: 80px;
        }
        footer{
            background-color: rgb(196, 117, 236);
            margin-top: 20px;
            padding: 20px;
            color: rgb(0, 0, 0);
            text-align: center;
        }
        .outside{
            width: 50%;
            height: 300px;
            background-color: rgb(196, 117, 236);
            border-radius: 20px;
            margin: auto;
            margin-top: 20px;
            padding: 8px;
            border: 2px solid;
            position: static;
            display: table;
        }
        .inside {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: auto;
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }
        .inside > label {
            font-size: 20px;
        }
        .inside > select {
            font-size: 15px;
        }
        .inside > button {
            background-color: #a30000; 
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
        }
        .inside > button:hover {
            box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
            cursor: pointer;
        }
        .inside > button:active {
            box-shadow: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
    <h1>Quiz <br> Fronteiras do Mundo</h1>
    </header>
    <div class="outside">
    <div class="inside">
    <h1>Qual país faz fronteira terrestre com a Ucrânia?</h1>
    <label>Selecione uma resposta</label> <br> <br>
    <select id="pergunta1">
        <option value="Alemanha">Alemanha</option>
        <option value="Lituânia">Lituânia</option>
        <option value="Rússia">Rússia</option>
        <option value="México">México</option>
        <option value="Tchéquia">Tchéquia</option>
        <option value="Bulgária">Bulgária</option>
    </select>
    </div>
    </div>
    <div class="outside">
        <div class="inside">
        <h1>Qual o único país que faz <br> fronteira terrestre com o Haiti?</h1>
        <label>Selecione uma resposta</label> <br> <br>
        <select id="pergunta2">
            <option value="Brasil">Brasil</option>
            <option value="Jamaica">Jamaica</option>
            <option value="Bahamas">Bahamas</option>
            <option value="Costa Rica">Costa Rica</option>
            <option value="Dominica">Dominica</option>
            <option value="República Dominicana">República Dominicana</option>
        </select>
        </div>
        </div>
        <div class="outside">
            <div class="inside">
            <h1>Que país NÃO faz fronteira terrestre <br> com a França?</h1>
            <label>Selecione uma resposta</label> <br> <br>
            <select id="pergunta3">
                <option value="Mônaco">Mônaco</option>
                <option value="Liechtenstein">Liechtenstein</option>
                <option value="Brasil">Brasil</option>
                <option value="Luxemburgo">Luxemburgo</option>
                <option value="Espanha">Espanha</option>
                <option value="Itália">Itália</option>
            </select>
            </div>
            </div>
        <div class="outside">
        <div class="inside">
            <h1>Pontuação Final</h1>
            <button id="fim" onclick="setPontos()">Ver pontuação</button>
            <h3 id="pontuação"></h3>
        </div>
        </div>
    <footer>
        <p>Obrigado por jogar!</p>
    </footer>

    <script>
        let question1 = document.querySelector("#pergunta1")
        let question2 = document.querySelector("#pergunta2")
        let question3 = document.querySelector("#pergunta3")
        var paragrafo = document.querySelector("#pontuação")

        function setPontos(){
            let resposta1 = question1.value
            let resposta2 = question2.value
            let resposta3 = question3.value
            let pontos = 0
            let frase = ""

            if (resposta1 === "Rússia") {
                pontos++
            }
            if (resposta2 === "República Dominicana") {
                pontos++
            }
            if (resposta3 === "Liechtenstein") {
                pontos++
            }
            
            if (pontos === 0) {
                frase = "Boa sorte da próxima vez!"
            }
            else if (pontos === 1) {
                frase = "Chegando lá!"
            }
            else if (pontos === 2) {
                frase = "Nada mal!"
            }
            else if (pontos === 3) {
                frase = "Muito bom!"
            }
            
            paragrafo.innerText = "Você conseguiu: " + pontos +"/3\n" + frase
        }
    </script>
</body>
</html>
